<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Seleção de Cargas</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;600;700;800&display=swap"
            rel="stylesheet" />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="noise"></div>
        <main class="layout">
            <header class="hero reveal">
                <p class="eyebrow">Extrato Bancário</p>
                <h1>Seleção de Cargas</h1>
                <p class="subtitle">Acesse rapidamente cada extrato
                    individual.</p>
                <p class="subtitle"><a href="index.html">Voltar para menu
                        principal</a></p>
            </header>
            <section class="table-panel reveal delay-1" id="extrato-main-panel">
                <div class="panel-head">
                    <h2>Cargas Disponíveis</h2>
                </div>
                <div id="extrato-main-content" class="months-grid">
                    <p class="cell-empty">Carregando cargas...</p>
                </div>
            </section>
        </main>

        <script src="dados-extrato/manifest.js"></script>
        <script src="ui-utils.js"></script>
        <script>
            (function () {
                const uiUtils =
                    globalThis.EXTRATO_UI_UTILS || {
                    escapeHtml: String,
                };
                const escapeHtml = uiUtils.escapeHtml;
                const alvo = document.getElementById('extrato-main-content');
                const cargas =
                    globalThis.EXTRATO_CARGAS || [];

                if (!alvo) return;
                if (!cargas.length) {
                    alvo.innerHTML = '<p class="cell-empty">Nenhuma carga encontrada.</p>';
                    return;
                }

                alvo.innerHTML = cargas
                    .map(
                        (item) => `
                            <article class="month-section">
                                <header class="month-header">
                                    <h3>${escapeHtml(item.arquivoCsv)}</h3>
                                </header>
                                <p class="subtitle">Período: ${escapeHtml(item.periodo || '-')}</p>
                                <p class="subtitle">Lançamentos: <strong>${escapeHtml(item.totalLancamentos || 0)}</strong></p>
                                <p class="subtitle"><a href="${escapeHtml(item.paginaHtml)}">Abrir extrato</a></p>
                            </article>
                        `,
                    )
                    .join('');
            })();
        </script>
    </body>
</html>
