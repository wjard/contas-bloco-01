<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Painel de Paginas - Extrato Banco Inter</title>
        <style>
            :root {
                --bg1: #f6f7fb;
                --bg2: #eef7f4;
                --text: #1b2230;
                --card: #ffffff;
                --line: #d9deea;
                --accent: #14532d;
                --accent-2: #0f766e;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                color: var(--text);
                background: radial-gradient(circle at 0% 0%, var(--bg2), transparent 50%),
                    linear-gradient(135deg, var(--bg1), #ffffff);
                display: grid;
                place-items: center;
                padding: 24px;
            }

            main {
                width: min(760px, 100%);
                background: var(--card);
                border: 1px solid var(--line);
                border-radius: 16px;
                padding: 24px;
                box-shadow: 0 10px 30px rgba(20, 28, 48, 0.08);
            }

            h1 {
                margin: 0 0 8px;
                font-size: clamp(1.5rem, 2.4vw, 2rem);
            }

            p {
                margin: 0 0 18px;
                color: #46506a;
            }

            ul {
                list-style: none;
                margin: 0;
                padding: 0;
                display: grid;
                gap: 12px;
            }

            a {
                display: block;
                text-decoration: none;
                color: var(--accent);
                font-weight: 700;
                background: #f9fbff;
                border: 1px solid var(--line);
                border-radius: 12px;
                padding: 14px 16px;
                transition: transform 120ms ease, border-color 120ms ease,
                    background-color 120ms ease;
            }

            a:hover {
                transform: translateY(-1px);
                border-color: var(--accent-2);
                background: #f2fffb;
            }

            small {
                display: block;
                margin-top: 18px;
                color: #5a6277;
            }

            .status-chip {
                margin-top: 16px;
                display: inline-flex;
                align-items: center;
                gap: 10px;
                padding: 10px 14px;
                border-radius: 999px;
                border: 1px solid transparent;
                font-weight: 600;
                font-size: 0.95rem;
                letter-spacing: 0.1px;
                transition: all 180ms ease;
            }

            .status-chip::before {
                content: '';
                width: 10px;
                height: 10px;
                border-radius: 50%;
                flex: 0 0 10px;
            }

            .status-loading {
                color: #334155;
                background: linear-gradient(135deg, #f8fafc, #eef2ff);
                border-color: #dbe3f0;
            }

            .status-loading::before {
                background: #0f766e;
                box-shadow: 0 0 0 0 rgba(15, 118, 110, 0.45);
                animation: pulse 1.5s infinite;
            }

            .status-ready {
                color: #14532d;
                background: linear-gradient(135deg, #ecfdf5, #dcfce7);
                border-color: #86efac;
                box-shadow: 0 8px 18px rgba(22, 163, 74, 0.16);
            }

            .status-ready::before {
                background: #16a34a;
            }

            .status-error {
                color: #7f1d1d;
                background: linear-gradient(135deg, #fef2f2, #fee2e2);
                border-color: #fca5a5;
            }

            .status-error::before {
                background: #dc2626;
            }

            @keyframes pulse {
                0% {
                    box-shadow: 0 0 0 0 rgba(15, 118, 110, 0.45);
                }
                70% {
                    box-shadow: 0 0 0 10px rgba(15, 118, 110, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(15, 118, 110, 0);
                }
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Painel de navegação</h1>
            <p>Escolha uma página para abrir o site estático:</p>
            <ul>
                <li><a href="inicio.html">Detalhado por mês/ano</a></li>
                <li><a href="resumo-anual.html">Lançamentos por mês/categoria
                        (entradas e saídas)</a></li>
                <li><a href="resumo-por-mes-saldo.html">Resumo por mês e
                        saldo</a></li>
            </ul>
            <small>Os dados são carregados localmente de
                dados-inter/todas-cargas.js.</small>
            <div id="dataStatus" class="status-chip status-loading">Carregando
                dados...</div>
        </main>
        <script src="scripts/gerar-dados.js"></script>
        <script src="scripts/gerar-dados-inter.js"></script>
        <script>
            (function () {
                const statusEl = document.getElementById('dataStatus');
                if (!statusEl) return;

                const isLoaded = (value) =>
                    value === 'dados-financeiros carregado' ||
                    value === 'dados-financeiros ja carregado' ||
                    value === 'todas-cargas carregado' ||
                    value === 'todas-cargas ja carregado';

                const isError = (value) =>
                    typeof value === 'string' && value.startsWith('erro');

                const applyState = (type, text) => {
                    statusEl.classList.remove(
                        'status-loading',
                        'status-ready',
                        'status-error',
                    );
                    statusEl.classList.add(type);
                    statusEl.textContent = text;
                };

                const tick = () => {
                    const s1 = globalThis.GERAR_DADOS_STATUS;
                    const s2 = globalThis.GERAR_DADOS_INTER_STATUS;

                    if (isError(s1) || isError(s2)) {
                        applyState(
                            'status-error',
                            'Erro ao carregar os dados. Verifique os arquivos locais.',
                        );
                        return true;
                    }

                    const ok1 = isLoaded(s1);
                    const ok2 = isLoaded(s2);

                    if (ok1 && ok2) {
                        applyState(
                            'status-ready',
                            'Dados carregados com sucesso',
                        );
                        return true;
                    }

                    applyState('status-loading', 'Carregando dados...');
                    return false;
                };

                if (tick()) return;

                const timer = setInterval(() => {
                    if (tick()) {
                        clearInterval(timer);
                    }
                }, 150);

                setTimeout(() => {
                    clearInterval(timer);
                    if (statusEl.classList.contains('status-loading')) {
                        applyState(
                            'status-error',
                            'Tempo excedido ao carregar os dados.',
                        );
                    }
                }, 12000);
            })();
        </script>
    </body>
</html>
