  <style>
:root {
    --bg: #f7f1e8;
    --bg-2: #f0dfce;
    --card: #fffaf4;
    --ink: #3f2c20;
    --ink-soft: #705a4b;
    --line: #d9c3ad;
    --accent-1: #c18f61;
    --accent-2: #87a97b;
    --accent-3: #d6765a;
    --accent-4: #668fa3;
    --shadow: 0 12px 36px rgba(95, 59, 35, 0.15);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    background:
        radial-gradient(circle at 12% 18%, #f5e6d7 0 28%, transparent 29%),
        radial-gradient(circle at 92% 85%, #e9d4be 0 18%, transparent 19%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
    min-height: 100vh;
}

.noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.08;
    background-image: repeating-radial-gradient(
        circle at 0 0,
        transparent 0 4px,
        #5f3b2307 4px 6px
    );
}

.layout {
    width: 100%;
    max-width: none;
    margin: 0;
    display: grid;
    gap: 0;
    padding: 0;
    position: relative;
    z-index: 1;
}

.hero,
.panel,
.table-panel,
.cards .card {
    background: #fffbf7;
    border: 1px solid #e6d3c0;
    border-radius: 18px;
    box-shadow: var(--shadow);
}

.hero {
    padding: 28px;
}

.eyebrow {
    margin: 0;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 800;
    color: var(--ink-soft);
}

h1,
h2 {
    margin: 0;
    font-family: 'Fraunces', serif;
}

h1 {
    margin-top: 8px;
    font-size: clamp(1.7rem, 4.5vw, 3rem);
    color: #2f2018;
}

.subtitle {
    margin: 10px 0 0;
    color: var(--ink-soft);
    max-width: 72ch;
}

.page-switcher {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.page-switcher label {
    color: var(--ink-soft);
    font-weight: 700;
}

.page-switcher select {
    min-width: 320px;
    max-width: 100%;
    background: #fff;
    border: 1px solid #d8c2ac;
    color: var(--ink);
    border-radius: 10px;
    padding: 8px 10px;
    font-family: 'Manrope', sans-serif;
}

.cards {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(5, minmax(0, 1fr));
}

.card {
    padding: 16px;
}

.card small {
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.75rem;
    font-weight: 700;
}

.card strong {
    display: block;
    margin-top: 8px;
    font-size: 1.45rem;
}

.panel {
    padding: 18px;
}

.panel-head {
    margin-bottom: 10px;
}

.panel-head p {
    margin: 6px 0 0;
    color: var(--ink-soft);
    font-size: 0.92rem;
}

.table-panel {
    padding: 18px;
}

.category-legend {
    background: #fffaf5;
    border: 1px solid #e6d3c0;
    border-radius: 14px;
    padding: 14px;
}

.category-legend h3 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
}

.category-legend p {
    margin: 5px 0 10px;
    color: var(--ink-soft);
    font-size: 0.9rem;
}

.category-legend-status {
    font-weight: 700;
}

.category-legend-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.legend-filter-tag {
    cursor: pointer;
    transition:
        transform 120ms ease,
        box-shadow 120ms ease,
        filter 120ms ease;
}

.legend-filter-tag:hover {
    transform: translateY(-1px);
    filter: saturate(1.06);
}

.legend-tag-active {
    box-shadow:
        0 0 0 2px #5f3b23,
        0 2px 7px #5f3b2333;
}

.months-grid {
    display: grid;
    gap: 14px;
}

.month-section {
    border: 1px solid #e6d3c0;
    background: #fffdfa;
    border-radius: 12px;
    padding: 12px;
}

.month-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
}

.month-header h3 {
    margin: 0;
    font-family: 'Fraunces', serif;
}

.month-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-size: 0.9rem;
    color: var(--ink-soft);
}

.month-summary strong {
    color: var(--ink);
}

.month-categories {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
}

.month-categories-title {
    color: var(--ink-soft);
    font-size: 0.86rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding-top: 4px;
}

.month-categories-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.month-categories-groups {
    display: grid;
    gap: 8px;
    width: 100%;
}

.month-categories-group {
    display: flex;
    align-items: flex-start;
    gap: 8px;
}

.month-categories-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.month-categories-subtotal {
    font-size: 0.83rem;
    color: var(--ink-soft);
    font-weight: 700;
}

.tag-empty {
    opacity: 0.75;
}

.table-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: 12px;
}

.detailed-table th:nth-child(4),
.detailed-table td:nth-child(4),
.detailed-table th:nth-child(5),
.detailed-table td:nth-child(5),
.detailed-table th:nth-child(6),
.detailed-table td:nth-child(6) {
    white-space: nowrap;
    word-break: normal;
    font-size: 0.75rem;
}

.detailed-table th:nth-child(1),
.detailed-table td:nth-child(1) {
    width: 72px;
    min-width: 72px;
    white-space: nowrap;
    word-break: normal;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 680px;
    background: white;
    table-layout: auto;
}

th,
td {
    padding: 7px 8px;
    border-bottom: 1px solid #eddcc8;
    text-align: left;
    white-space: normal;
    overflow: visible;
    text-overflow: clip;
    word-break: break-word;
    overflow-wrap: anywhere;
}

td:last-child,
th:last-child {
    text-align: right;
}

th {
    background: #f8e8d7;
    color: #5a3f2f;
    font-size: 0.84rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

tbody tr:nth-child(even) {
    background: #fffaf5;
}

.year-matrix-table {
    min-width: 1180px;
}

.year-matrix-table th,
.year-matrix-table td {
    vertical-align: top;
    white-space: normal;
    word-break: break-all;
    overflow-wrap: anywhere;
    -webkit-hyphens: auto;
    hyphens: auto;
}

.year-matrix-table thead th {
    white-space: normal;
    line-height: 1.15;
}

.month-row-title {
    min-width: 130px;
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
}

.year-matrix-table td {
    min-width: 170px;
}

.cell-value-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.cell-value-item {
    display: block;
    font-size: 0.85rem;
    line-height: 1.25;
    white-space: normal;
    word-break: break-all;
    overflow-wrap: anywhere;
}

.cell-sum {
    margin-top: 6px;
    padding-top: 5px;
    border-top: 1px dashed #d9c3ad;
    font-size: 0.8rem;
    font-weight: 800;
}

.cell-empty {
    color: var(--ink-soft);
    opacity: 0.72;
}

.year-total-cell {

}

.page-resumo-anual h1 {

.page-resumo-anual h2 {

.page-resumo-anual .panel-head p {

.page-resumo-anual .category-legend p,

.page-resumo-anual th {

.page-resumo-anual th,

}

.page-resumo-anual .tag {
    font-size: 0.52rem;

.page-resumo-anual .year-matrix-table td,
.page-resumo-anual .year-total-cell {
    min-width: 93px;
}

.page-resumo-anual .year-matrix-table td {
    font-size: 0.56rem;
    line-height: 1.2;
}

.page-resumo-anual .year-matrix-table td strong,
.page-resumo-anual .year-total-cell strong {
    font-size: 0.6rem;
    font-weight: 700;
}

.page-resumo-anual .year-matrix-table thead th {

.page-resumo-anual .month-row-title {

.year-total-cell small {

}

    padding: 8px 14px;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;

}

.mobile-view-toggle:hover {

}

.mobile-view-toggle-secondary {

.month-card-mobile {
    border: 1px solid #e1cdb8;
    border-radius: 12px;
    padding: 10px;

}

.month-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
}

.month-card-head h4 {

    font-family: 'Fraunces', serif;

}

.month-card-meta {

}

.month-card-meta small {

}

.month-card-list {

}

.month-card-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
}

.month-card-item strong {

}

.month-card-item-muted {

}

.month-card-details {
    margin-top: 8px;
    border-top: 1px dashed #dac3ad;
    padding-top: 8px;
}

.month-card-details summary {
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 0.72rem;
    font-weight: 800;
}

.month-card-list-muted {
    margin-top: 8px;
}

.resumo-mes-layout {
    display: grid;
    gap: 10px;
}

.resumo-rapido-panel {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
}

.resumo-rapido-item {
    border: 1px solid #e0cab4;
    border-radius: 12px;
    background: #fffaf4;
    padding: 10px;
    display: grid;
    gap: 3px;
}

.resumo-rapido-item small {
    color: var(--ink-soft);
    font-size: 0.66rem;
    text-transform: uppercase;

}

.resumo-rapido-item strong {

}

.resumo-rapido-item span {

}

.resumo-mes-card-mobile {

.resumo-mes-total-card {

.resumo-mes-card-grid {

.resumo-mes-card-grid small {

.resumo-mes-card-grid strong {

.year-matrix-table tfoot th,

td.negative {

}

.reveal {

    const escapeHtml = (texto) =>
        String(texto)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');

    const normalizar = (texto) =>
        String(texto || '')
            .normalize('NFD')
            .replaceAll(/[\u0300-\u036f]/g, '')
            .toLowerCase();

    const criarFormatadorMoeda = () =>
        new Intl.NumberFormat('pt-BR', {
            style: 'currency',
            currency: 'BRL',
        });

    const formatarDataISO = (iso) => {
        const data = new Date(iso);
        if (Number.isNaN(data.getTime())) return '-';
        return data.toLocaleDateString('pt-BR', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
        });
    };

    const formatarDataCurta = (valor) => {
        const texto = String(valor || '').trim();
        if (!texto) return '';

        const pad2 = (n) => String(n).padStart(2, '0');

        const matchPtBr = /^(\d{1,2})\/(\d{1,2})\/(\d{2}|\d{4})$/.exec(texto);
        if (matchPtBr) {
            const dia = Number(matchPtBr[1]);
            const mes = Number(matchPtBr[2]);
            const anoTexto = matchPtBr[3];
            const ano2 = anoTexto.length === 2 ? anoTexto : anoTexto.slice(-2);
            return `${pad2(dia)}/${pad2(mes)}/${ano2}`;
        }

        const matchIso = /^(\d{4})-(\d{1,2})-(\d{1,2})/.exec(texto);
        if (matchIso) {
            const ano2 = matchIso[1].slice(-2);
            const mes = Number(matchIso[2]);
            const dia = Number(matchIso[3]);
            return `${pad2(dia)}/${pad2(mes)}/${ano2}`;
        }

        const data = new Date(texto);
        if (!Number.isNaN(data.getTime())) {
            return `${pad2(data.getDate())}/${pad2(data.getMonth() + 1)}/${String(data.getFullYear()).slice(-2)}`;
        }

        return texto;
    };

    const uiUtils = {
        escapeHtml,
        normalizar,
        criarFormatadorMoeda,
        formatarDataISO,
        formatarDataCurta,
    };

    globalThis.EXTRATO_UI_UTILS = uiUtils;
})();

</script>

        'Boleto Condo. Bloco': 'Boleto Cond.<br>Bloco',

        'Material Limpeza': 'Material<br>Limpeza',

        'Seguro/Manut.': 'Seguro/<br>Manut.',
    };

    const LIMITE_CHARS_TAG_COLUNA = 16;

    const quebrarPalavraPorLimite = (palavra, limite) => {
        const partes = [];
        let restante = String(palavra || '');

        while (restante.length > limite) {
            partes.push(restante.slice(0, limite));
            restante = restante.slice(limite);
        }

        if (restante) partes.push(restante);
        return partes;
    };

    const empilharPalavraLonga = (palavra, limite, linhas) => {
        const partes = quebrarPalavraPorLimite(palavra, limite);
        if (!partes.length) return '';
        linhas.push(...partes.slice(0, -1));
        return partes.at(-1) || '';
    };

    const quebrarTextoPorLimite = (texto, limite = LIMITE_CHARS_TAG_COLUNA) => {
        const escapeHtml = getUiUtils().escapeHtml;
        const textoLimpo = String(texto || '').trim();
        if (!textoLimpo) return '';
        if (textoLimpo.length <= limite) return escapeHtml(textoLimpo);

        const palavras = textoLimpo.split(/\s+/);
        const linhas = [];
        let linhaAtual = '';

        for (const palavra of palavras) {
            const candidato = linhaAtual ? `${linhaAtual} ${palavra}` : palavra;

            if (candidato.length <= limite) {
                linhaAtual = candidato;
                continue;
            }

            if (linhaAtual) {
                linhas.push(linhaAtual);
            }

            if (palavra.length <= limite) {
                linhaAtual = palavra;
                continue;
            }

            linhaAtual = empilharPalavraLonga(palavra, limite, linhas);
        }

        if (linhaAtual) linhas.push(linhaAtual);
        return linhas.map((item) => escapeHtml(item)).join('<br>');
    };

    const formatarRotuloColunaTag = (
        nomeTag,
        configRotulo = CONFIG_ROTULO_TAG_COLUNA,
        limite = LIMITE_CHARS_TAG_COLUNA,

        const escapeHtml = getUiUtils().escapeHtml;
        const valorConfigurado = configRotulo[nomeTag];

        return quebrarTextoPorLimite(nomeTag, limite);

            criarFormatadorMoeda: () =>
                new Intl.NumberFormat('pt-BR', {
                    style: 'currency',

            formatarDataCurta: (valor) => String(valor || ''),
        };

    const getPrivacyUtils = () =>
        globalThis.EXTRATO_PRIVACY_UTILS || {
            classificarCategoria: () => 'Outros',
            anonimizarDescricaoPorCategoria: (descricao) => descricao,
        };

    const extrairOrdemMesAno = (mesTexto) => {
        const [mesNome, anoTexto] = String(mesTexto || '').split('-');
        const ano = Number.parseInt(anoTexto, 10);
        const mes = ORDEM_MESES.indexOf(mesNome);
        if (!Number.isFinite(ano) || mes < 0) return { ano: 0, mes: -1 };
        return { ano, mes };
    };

    const extrairMesAno = (mesTexto) => {
        const [mesNome, anoTexto] = String(mesTexto || '').split('-');
        const ano = Number.parseInt(anoTexto, 10);
        const ordemMes = ORDEM_MESES.indexOf(mesNome);

        if (!Number.isFinite(ano) || ordemMes < 0) return null;

        return {
            mesNome,
            ano,
            ordemMes,
            chave: `${ano}-${String(ordemMes + 1).padStart(2, '0')}`,
            rotulo: `${mesNome}/${ano}`,

    const limitarTag = (texto, limite = 20) => String(texto).slice(0, limite);

    const isEntrada = (item) =>

    const normalizarUrlComprovante = (valor) => {

        if (possuiProtocolo) return encodeURI(caminho);
        if (iniciaComWww) return encodeURI(`https://${caminho}`);

        if (
            caminho.startsWith('./') ||
            caminho.startsWith('../') ||
            caminho.startsWith('/')
        ) {
            return encodeURI(caminho);
        }

        return encodeURI(`./${caminho}`);
    };

    const appUtils = {
        ORDEM_MESES,
        LEGENDA_CATEGORIAS,
        CONFIG_ROTULO_TAG_COLUNA,
        LIMITE_CHARS_TAG_COLUNA,
        quebrarTextoPorLimite,

        limitarTag,
        isEntrada,
        isCredito,
        normalizarUrlComprovante,
        getClasseCategoria,
    };

            )
                .map((grupo) =>
                    dedupe(Array.isArray(grupo) ? grupo : String(grupo || '').split(',')),
                )
                .filter((grupo) => grupo.length > 0);

            return {
                tag,
                includesAny,
                includesAll,
            };
        });
    };

    const prepararRegrasComparacao = (regras) =>
        (regras || []).map((regra) => ({
            tag: regra.tag,
            includesAny: (regra.includesAny || []).map(normalizar),
            includesAll: (regra.includesAll || []).map((grupo) =>
                (grupo || []).map(normalizar),
            ),
        }));

    let regrasAtivas = normalizarRegras(REGRAS_CATEGORIA_PADRAO);
    let regrasComparacao = prepararRegrasComparacao(regrasAtivas);

    const setRegrasCategoria = (novasRegras) => {
        regrasAtivas = normalizarRegras(novasRegras);
        regrasComparacao = prepararRegrasComparacao(regrasAtivas);
    };

    const getRegrasCategoria = () => clonar(regrasAtivas);

    const carregarRegrasDoJson = async () => {
        if (typeof fetch !== 'function') return;

        try {
            const resposta = await fetch('./categoria-regras.json', {
                cache: 'no-store',
            });
            if (!resposta.ok) return;
            const payload = await resposta.json();

            let regras = null;
            if (Array.isArray(payload)) {
                regras = payload;
            } else if (Array.isArray(payload?.regras)) {
                regras = payload.regras;
            }

            if (regras) {
                setRegrasCategoria(regras);
            }
        } catch (error) {
            // Fallback padrao em memoria.
            console.warn('Falha ao carregar categoria-regras.json:', error);
        }
    };

    const bateAlgumTermo = (desc, termos) =>
        (termos || []).some((termo) => desc.includes(termo));

    const bateTodosTermosDoGrupo = (desc, grupo) =>
        (grupo || []).every((termo) => desc.includes(termo));

    const bateAlgumGrupo = (desc, grupos) =>
        (grupos || []).some((grupo) => bateTodosTermosDoGrupo(desc, grupo));

    const classificarCategoria = (descricao) => {
        const desc = normalizar(descricao);
        const regra = regrasComparacao.find((item) => {
            const bateAny = bateAlgumTermo(desc, item.includesAny);
            if (bateAny) return true;
            return bateAlgumGrupo(desc, item.includesAll);
        });
        return regra ? regra.tag : 'Outros';
    };

    const anonimizarDescricaoPorCategoria = (descricao, categoria) => {
        if (categoria !== 'Boleto Condo. Bloco') return descricao;

        const descNormalizada = normalizar(descricao);
        if (descNormalizada.includes('pix recebido')) {
            return 'Boleto Recebido Via Pix';
        }

        if (descNormalizada.includes('boleto de cobran')) {
            return 'Boleto de Cobranca Recebido';
        }

        return descricao;
    };

    const privacyUtils = {
        classificarCategoria,
        anonimizarDescricaoPorCategoria,
        getRegrasCategoria,
        setRegrasCategoria,
        getRegrasCategoriaPadrao: () => clonar(REGRAS_CATEGORIA_PADRAO),
    };

    globalThis.EXTRATO_PRIVACY_UTILS = privacyUtils;
    globalThis.INTER_PRIVACY_UTILS = privacyUtils;

    carregarRegrasDoJson();
})();

</script>
  <script>
(function () {
    const dados = globalThis.DADOS_FINANCEIROS;
    const cargas = globalThis.EXTRATO_CARGAS || [];
    if (!dados) return;

    const appUtils = globalThis.EXTRATO_APP_UTILS;
    if (!appUtils) return;

    const uiUtils = appUtils.getUiUtils();

    const moeda = uiUtils.criarFormatadorMoeda();
    const formatarDataISO = uiUtils.formatarDataISO;
    const escapeHtml = uiUtils.escapeHtml;

    const privacyUtils = appUtils.getPrivacyUtils();
    const extrairOrdemMesAno = appUtils.extrairOrdemMesAno;

    const cards = [
        {
            titulo: 'Arquivo',
            valor: dados.arquivo || '-',
        },
        {
            titulo: 'Periodo',
            valor: `${dados.periodo.inicio || '-'} ate ${dados.periodo.fim || '-'}`,
        },
        {
            titulo: 'Entradas Totais',
            valor: moeda.format(dados.resumo.totalEntradas || 0),
        },
        {
            titulo: 'Saidas Totais',
            valor: moeda.format(dados.resumo.totalSaidas || 0),
        },
        {
            titulo: 'Saldo Geral',
            valor: moeda.format(dados.resumo.saldoGeral || 0),
        },
        {
            titulo: 'Atualizado em',
            valor: formatarDataISO(dados.atualizadoEm),
        },
    ];

    const resumoCards = document.getElementById('resumoCards');
    resumoCards.innerHTML = cards
        .map(
            (card) => `
      <article class="card">
        <small>${escapeHtml(card.titulo)}</small>
        <strong>${escapeHtml(card.valor)}</strong>
      </article>
    `,
        )
        .join('');

    const seletorDetalhe = document.getElementById('cargaSelectDetalhe');
    if (seletorDetalhe) {
        const atual = String(location.pathname).split('/').pop();
        const options = [
            '<option value="">Selecione uma carga</option>',
            ...cargas.map(
                (c) =>
                    `<option value="${escapeHtml(c.paginaHtml)}" ${c.paginaHtml === atual ? 'selected' : ''}>${escapeHtml(c.arquivoCsv)}</option>`,
            ),
        ];
        seletorDetalhe.innerHTML = options.join('');
        seletorDetalhe.addEventListener('change', (event) => {
            const pagina = event.target.value;
            if (pagina) location.href = pagina;
        });
    }

    const tabelasMeses = document.getElementById('tabelasMeses');
    const mesesOrdenados = [...(dados.porMes || [])].sort((a, b) => {
        const ordemA = extrairOrdemMesAno(a.mes);
        const ordemB = extrairOrdemMesAno(b.mes);
        return ordemB.ano - ordemA.ano || ordemB.mes - ordemA.mes;
    });

    tabelasMeses.innerHTML = mesesOrdenados
        .map((mes) => {
            const saldoClass = mes.saldo >= 0 ? 'positive' : 'negative';

            const linhas = (mes.lancamentos || [])
                .map((item) => {
                    const tipoClass =
                        item.tipo === 'entrada' ? 'positive' : 'negative';
                    const tipoTexto =
                        item.tipo === 'entrada' ? 'Entrada' : 'Saida';
                    const valorClass =
                        item.valor >= 0 ? 'positive' : 'negative';
                    const categoria = privacyUtils.classificarCategoria(
                        item.descricao,
                    );
                    const descricaoExibicao =
                        privacyUtils.anonimizarDescricaoPorCategoria(
                            item.descricao,
                            categoria,
                        );

                    return `
                        <tr>
                            <td>${escapeHtml(item.data)}</td>
                            <td>${escapeHtml(descricaoExibicao)}</td>
                            <td class="${tipoClass}">${tipoTexto}</td>
                            <td class="${valorClass}">${moeda.format(item.valor)}</td>
                            <td>${moeda.format(item.saldoConta || 0)}</td>
                        </tr>
                    `;
                })
                .join('');

            return `
                <article class="month-section">
                    <header class="month-header">
                        <h3>${escapeHtml(mes.mes)}</h3>
                        <div class="month-summary">
                            <span>Entradas: <strong>${moeda.format(mes.entradas || 0)}</strong></span>
                            <span>Saidas: <strong>${moeda.format(mes.saidas || 0)}</strong></span>
                            <span class="${saldoClass}">Saldo: <strong>${moeda.format(mes.saldo || 0)}</strong></span>
                            <span>Itens: <strong>${mes.itens || 0}</strong></span>
                        </div>
                    </header>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Data Lancamento</th>
                                    <th>Descricao</th>
                                    <th>Tipo</th>
                                    <th>Valor</th>
                                    <th>Saldo</th>
                                </tr>
                            </thead>
                            <tbody>${linhas}</tbody>
                        </table>
                    </div>
                </article>
            `;
        })
        .join('');
})();

</script>
