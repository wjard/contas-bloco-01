<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Primeira Versao - Dados Consolidados</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;600;700;800&display=swap"
            rel="stylesheet" />
        <style>
:root {
    --bg: #f7f1e8;
    --bg-2: #f0dfce;
    --card: #fffaf4;
    --ink: #3f2c20;
    --ink-soft: #705a4b;
    --line: #d9c3ad;
    --accent-1: #c18f61;
    --accent-2: #87a97b;
    --accent-3: #d6765a;
    --accent-4: #668fa3;
    --shadow: 0 12px 36px rgba(95, 59, 35, 0.15);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    background:
        radial-gradient(circle at 12% 18%, #f5e6d7 0 28%, transparent 29%),
        radial-gradient(circle at 92% 85%, #e9d4be 0 18%, transparent 19%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
    min-height: 100vh;
}

.noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.08;
    background-image: repeating-radial-gradient(
        circle at 0 0,
        transparent 0 4px,
        #5f3b2307 4px 6px
    );
}

.layout {
    width: 100%;
    max-width: none;
    margin: 0;
    display: grid;
    gap: 0;
    padding: 0;
    position: relative;
    z-index: 1;
}

.hero,
.panel,
.table-panel,
.cards .card {
    background: #fffbf7;
    border: 1px solid #e6d3c0;
    border-radius: 18px;
    box-shadow: var(--shadow);
}

.hero {
    padding: 28px;
}

.eyebrow {
    margin: 0;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 800;
    color: var(--ink-soft);
}

h1,
h2 {
    margin: 0;
    font-family: 'Fraunces', serif;
}

h1 {
    margin-top: 8px;
    font-size: clamp(1.7rem, 4.5vw, 3rem);
    color: #2f2018;
}

.subtitle {
    margin: 10px 0 0;
    color: var(--ink-soft);
    max-width: 72ch;
}

.page-switcher {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.page-switcher label {
    color: var(--ink-soft);
    font-weight: 700;
}

.page-switcher select {
    min-width: 320px;
    max-width: 100%;
    background: #fff;
    border: 1px solid #d8c2ac;
    color: var(--ink);
    border-radius: 10px;
    padding: 8px 10px;
    font-family: 'Manrope', sans-serif;
}

.cards {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(5, minmax(0, 1fr));
}

.card {
    padding: 16px;
}

.card small {
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.75rem;
    font-weight: 700;
}

.card strong {
    display: block;
    margin-top: 8px;
    font-size: 1.45rem;
}

.panel {
    padding: 18px;
}

.panel-head {
    margin-bottom: 10px;
}

.panel-head p {
    margin: 6px 0 0;
    color: var(--ink-soft);
    font-size: 0.92rem;
}

.table-panel {
    padding: 18px;
}

.category-legend {
    background: #fffaf5;
    border: 1px solid #e6d3c0;
    border-radius: 14px;
    padding: 14px;
}

.category-legend h3 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
}

.category-legend p {
    margin: 5px 0 10px;
    color: var(--ink-soft);
    font-size: 0.9rem;
}

.category-legend-status {
    font-weight: 700;
}

.category-legend-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.legend-filter-tag {
    cursor: pointer;
    transition:
        transform 120ms ease,
        box-shadow 120ms ease,
        filter 120ms ease;
}

.legend-filter-tag:hover {
    transform: translateY(-1px);
    filter: saturate(1.06);
}

.legend-tag-active {
    box-shadow:
        0 0 0 2px #5f3b23,
        0 2px 7px #5f3b2333;
}

.months-grid {
    display: grid;
    gap: 14px;
}

.month-section {
    border: 1px solid #e6d3c0;
    background: #fffdfa;
    border-radius: 12px;
    padding: 12px;
}

.month-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
}

.month-header h3 {
    margin: 0;
    font-family: 'Fraunces', serif;
}

.month-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-size: 0.9rem;
    color: var(--ink-soft);
}

.month-summary strong {
    color: var(--ink);
}

.month-categories {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
}

.month-categories-title {
    color: var(--ink-soft);
    font-size: 0.86rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding-top: 4px;
}

.month-categories-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.month-categories-groups {
    display: grid;
    gap: 8px;
    width: 100%;
}

.month-categories-group {
    display: flex;
    align-items: flex-start;
    gap: 8px;
}

.month-categories-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.month-categories-subtotal {
    font-size: 0.83rem;
    color: var(--ink-soft);
    font-weight: 700;
}

.tag-empty {
    opacity: 0.75;
}

.table-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: 12px;
}

.detailed-table th:nth-child(4),
.detailed-table td:nth-child(4),
.detailed-table th:nth-child(5),
.detailed-table td:nth-child(5),
.detailed-table th:nth-child(6),
.detailed-table td:nth-child(6) {
    white-space: nowrap;
    word-break: normal;
    font-size: 0.75rem;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 680px;
    background: white;
    table-layout: auto;
}

th,
td {
    padding: 7px 8px;
    border-bottom: 1px solid #eddcc8;
    text-align: left;
    white-space: normal;
    overflow: visible;
    text-overflow: clip;
    word-break: break-word;
    overflow-wrap: anywhere;
}

td:last-child,
th:last-child {
    text-align: right;
}

th {
    background: #f8e8d7;
    color: #5a3f2f;
    font-size: 0.84rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

tbody tr:nth-child(even) {
    background: #fffaf5;
}

.year-matrix-table {
    min-width: 1180px;
}

.year-matrix-table th,
.year-matrix-table td {
    vertical-align: top;
    white-space: normal;
    word-break: break-all;
    overflow-wrap: anywhere;
    -webkit-hyphens: auto;
    hyphens: auto;
}

.year-matrix-table thead th {
    white-space: normal;
    line-height: 1.15;
}

.month-row-title {
    min-width: 130px;
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
}

.year-matrix-table td {
    min-width: 170px;
}

.cell-value-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.cell-value-item {
    display: block;
    font-size: 0.85rem;
    line-height: 1.25;
    white-space: normal;
    word-break: break-all;
    overflow-wrap: anywhere;
}

.cell-sum {
    margin-top: 6px;
    padding-top: 5px;
    border-top: 1px dashed #d9c3ad;
    font-size: 0.8rem;
    font-weight: 800;
}

.cell-empty {
    color: var(--ink-soft);
    opacity: 0.72;
}

.year-total-cell {
    min-width: 170px;
}

.page-resumo-anual h1 {
    font-size: clamp(1.19rem, 3.15vw, 2.1rem);
}

.page-resumo-anual h2 {
    font-size: 1.12rem;
}

.page-resumo-anual .panel-head p {
    font-size: 0.64rem;
}

.page-resumo-anual .category-legend h3 {
    font-size: 0.74rem;
}

.page-resumo-anual .category-legend p,
.page-resumo-anual .month-summary,
.page-resumo-anual .cell-value-item,
.page-resumo-anual .year-total-cell small {
    font-size: 0.63rem;
}

.page-resumo-anual th {
    font-size: 0.64rem;
}

.page-resumo-anual th,
.page-resumo-anual td {
    padding: 5px 6px;
}

.page-resumo-anual .tag {
    font-size: 0.52rem;
    padding: 3px 7px;
}

.page-resumo-anual .year-matrix-table td,
.page-resumo-anual .year-total-cell {
    min-width: 88px;
}

.page-resumo-anual .year-matrix-table td {
    font-size: 0.56rem;
    line-height: 1.2;
}

.page-resumo-anual .year-matrix-table td strong,
.page-resumo-anual .year-total-cell strong {
    font-size: 0.6rem;
    font-weight: 700;
}

.page-resumo-anual .year-matrix-table thead th {
    font-size: 0.65rem;
    line-height: 1.12;
}

.page-resumo-anual .month-row-title {
    min-width: 70px;
}

.year-total-cell small {
    display: block;
    margin-top: 4px;
    color: var(--ink-soft);
    font-size: 0.76rem;
    font-weight: 700;
}

.mobile-view-controls {
    display: none;
    margin: 10px 0 4px;
    gap: 8px;
    flex-wrap: wrap;
}

.mobile-view-toggle {
    border: 1px solid #cfae8f;
    background: #f7eadc;
    color: #4a3225;
    border-radius: 999px;
    padding: 8px 14px;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
}

.mobile-view-toggle:hover {
    background: #f2dfca;
}

.mobile-view-toggle-secondary {
    background: #fff7ed;
    border-color: #dfc1a1;
}

.annual-mobile-view {
    display: none;
}

.month-card-mobile {
    border: 1px solid #e1cdb8;
    border-radius: 12px;
    padding: 10px;
    background: #fffdf9;
}

.month-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
}

.month-card-head h4 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-size: 0.92rem;
}

.month-card-meta {
    text-align: right;
    display: grid;
    gap: 2px;
}

.month-card-meta small {
    color: var(--ink-soft);
    font-size: 0.72rem;
    font-weight: 700;
}

.month-card-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 6px;
}

.month-card-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
}

.month-card-item strong {
    font-size: 0.85rem;
}

.month-card-item-muted {
    opacity: 0.86;
}

.month-card-details {
    margin-top: 8px;
    border-top: 1px dashed #dac3ad;
    padding-top: 8px;
}

.month-card-details summary {
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 0.72rem;
    font-weight: 800;
}

.month-card-list-muted {
    margin-top: 8px;
}

.resumo-mes-layout {
    display: grid;
    gap: 10px;
}

.resumo-rapido-panel {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
}

.resumo-rapido-item {
    border: 1px solid #e0cab4;
    border-radius: 12px;
    background: #fffaf4;
    padding: 10px;
    display: grid;
    gap: 3px;
}

.resumo-rapido-item small {
    color: var(--ink-soft);
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 800;
}

.resumo-rapido-item strong {
    font-size: 0.9rem;
}

.resumo-rapido-item span {
    color: var(--ink-soft);
    font-size: 0.73rem;
    line-height: 1.25;
}

.resumo-mes-mobile-list {
    display: none;
}

.resumo-mes-card-mobile {
    border: 1px solid #e1cdb8;
    border-radius: 12px;
    background: #fffdf9;
    padding: 10px;
    box-shadow: 0 3px 12px #5f3b2312;
}

.resumo-mes-total-card {
    background: #fbf1e7;
}

.resumo-mes-card-head {
    margin: 0 0 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
}

.resumo-mes-card-head h3 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
}

.resumo-mes-card-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
}

.resumo-mes-card-grid small {
    display: block;
    font-size: 0.7rem;
    color: var(--ink-soft);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
}

.resumo-mes-card-grid strong {
    font-size: 0.82rem;
}

.year-matrix-table tfoot th,
.year-matrix-table tfoot td {
    background: #f3e1ce;
    border-top: 1px solid #d9c3ad;
}

.comprovante-link {
    color: inherit;
    font-weight: 700;
    text-decoration: underline;
    text-decoration-color: #b88f6a;
    text-underline-offset: 2px;
    overflow-wrap: anywhere;
}

.comprovante-link:hover {
    color: #5f3b23;
    text-decoration-color: #5f3b23;
}

.tag {
    display: inline-flex;
    align-items: center;
    padding: 4px 9px;
    border-radius: 999px;
    border: 1px solid transparent;
    font-size: 0.74rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
}

.tag-credit {
    color: #1f5b39;
    background: #d8efdf;
    border-color: #9ac8ad;
}

.tag-debit {
    color: #7e2f22;
    background: #f8ddd6;
    border-color: #d9a293;
}

.tag-category {
    color: #4a382e;
    background: #f2e5d7;
    border-color: #d8c2aa;
}

.tag-category.cat-boleto {
    color: #1f5d3a;
    background: #dff2e7;
    border-color: #9ecbae;
}

.tag-category.cat-subsindico {
    color: #6b2f7a;
    background: #f3e2f8;
    border-color: #d4b2df;
}

.tag-category.cat-limpeza {
    color: #205f76;
    background: #dff0f6;
    border-color: #a9cfde;
}

.tag-category.cat-consumo {
    color: #8a3f1f;
    background: #fbe8dc;
    border-color: #dfb79e;
}

.tag-category.cat-rateio {
    color: #2f5572;
    background: #e2edf9;
    border-color: #b3c7e6;
}

.tag-category.cat-repasse {
    color: #5b4634;
    background: #efe6dc;
    border-color: #d2c1ad;
}

.tag-category.cat-seguro {
    color: #4f3d8a;
    background: #e8e4fa;
    border-color: #c4bbe8;
}

.tag-category.cat-devolucao {
    color: #2d6a67;
    background: #e0f2ef;
    border-color: #a8d5cf;
}

.tag-category.cat-materiais {
    color: #7c4e1e;
    background: #f7ecd8;
    border-color: #d8be97;
}

.tag-category.cat-terceiros {
    color: #77403f;
    background: #f7e3e2;
    border-color: #d9aeac;
}

.tag-category.cat-outros {
    color: #4a382e;
    background: #f2e5d7;
    border-color: #d8c2aa;
}

td.negative {
    color: #9b3e2a;
    font-weight: 700;
}

td.positive {
    color: #32623f;
    font-weight: 700;
}

.negative {
    color: #9b3e2a;
    font-weight: 700;
}

.positive {
    color: #32623f;
    font-weight: 700;
}

.reveal {
    opacity: 0;
    transform: translateY(14px);
    animation: revealUp 600ms ease forwards;
}

.delay-1 {
    animation-delay: 120ms;
}
.delay-2 {
    animation-delay: 240ms;
}
.delay-3 {
    animation-delay: 360ms;
}

@keyframes revealUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 980px) {
    .layout {
        width: 100%;
        margin: 0;
        gap: 14px;
    }

    .hero,
    .panel,
    .table-panel,
    .cards .card {
        padding: 14px;
    }

    .table-panel {
        padding: 14px;
    }

    .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .month-header {
        flex-direction: column;
    }

    .month-categories {
        flex-direction: column;
        gap: 6px;
    }

    .month-categories-group {
        flex-direction: column;
        gap: 6px;
    }

    .month-categories-head {
        width: 100%;
    }

    .page-resumo-anual .layout {
        width: 100%;
        margin: 0;
    }

    .page-resumo-anual .table-panel {
        padding: 10px;
    }

    .page-resumo-anual .panel-head h2 {
        font-size: 0.98rem;
        line-height: 1.35;
    }

    .page-resumo-anual .panel-head p,
    .page-resumo-anual .category-legend p,
    .page-resumo-anual .month-summary,
    .page-resumo-anual .cell-value-item,
    .page-resumo-anual .year-total-cell small {
        font-size: 0.72rem;
    }

    .page-resumo-anual .year-matrix-table {
        min-width: 700px;
    }

    .page-resumo-anual .year-matrix-table td,
    .page-resumo-anual .year-total-cell {
        min-width: 84px;
    }

    .page-resumo-anual .mobile-view-controls {
        display: flex;
        justify-content: flex-end;
    }

    .page-resumo-anual .annual-mobile-view {
        display: grid;
        gap: 8px;
    }

    .page-resumo-anual .annual-table-view {
        display: none;
    }

    .page-resumo-anual .year-section.mobile-show-table .annual-mobile-view {
        display: none;
    }

    .page-resumo-anual .year-section.mobile-show-table .annual-table-view {
        display: block;
    }

    .page-resumo-anual
        .year-section.table-mobile-compact
        .annual-table-view
        .optional-col {
        display: none;
    }

    .page-resumo-mes-saldo .mobile-view-controls {
        display: flex;
        justify-content: flex-end;
    }

    .page-resumo-mes-saldo .resumo-mes-mobile-list {
        display: grid;
        gap: 8px;
    }

    .page-resumo-mes-saldo .resumo-mes-table-wrap {
        display: none;
    }

    .page-resumo-mes-saldo
        .resumo-mes-layout.show-table-mobile
        .resumo-mes-mobile-list {
        display: none;
    }

    .page-resumo-mes-saldo
        .resumo-mes-layout.show-table-mobile
        .resumo-mes-table-wrap {
        display: block;
    }
}

@media (max-width: 560px) {
    .layout {
        width: 100%;
        margin-top: 0;
    }

    h1 {
        font-size: clamp(1.35rem, 6.6vw, 1.8rem);
    }

    h2 {
        font-size: 1.15rem;
    }

    .subtitle,
    .panel-head p,
    .month-summary {
        font-size: 0.86rem;
        line-height: 1.45;
    }

    .hero,
    .panel,
    .table-panel,
    .cards .card {
        border-radius: 14px;
    }

    .month-section {
        padding: 10px;
    }

    table {
        min-width: 560px;
    }

    th,
    td {
        padding: 6px;
        font-size: 0.8rem;
    }

    .year-matrix-table {
        min-width: 900px;
    }

    .year-matrix-table td,
    .year-total-cell {
        min-width: 130px;
    }

    .cards {
        grid-template-columns: 1fr;
    }

    .page-switcher select {
        min-width: 100%;
    }

    .page-switcher {
        flex-direction: column;
        align-items: stretch;
    }

    .category-legend-tags,
    .month-categories-list,
    .month-categories-head {
        gap: 6px;
    }

    .tag {
        white-space: normal;
        text-align: center;
        line-height: 1.2;
    }

    .page-resumo-anual .layout {
        width: 100%;
        margin: 0;
        gap: 10px;

        <script>
(function () {
    const dados = globalThis.DADOS_FINANCEIROS;
    if (!dados) return;

    const moeda = new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL',
    });

    const formatarDataISO = (iso) => {
        const data = new Date(iso);
        if (Number.isNaN(data.getTime())) return '-';
        return data.toLocaleDateString('pt-BR', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
        });
    };

    const escapeHtml = (texto) =>
        String(texto)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');

    const cards = [
        {
            titulo: 'Periodo',
            valor: `${dados.periodo.inicio} ate ${dados.periodo.fim}`,
        },
        {
            titulo: 'Entradas Totais',
            valor: moeda.format(dados.resumo.totalEntradas),
        },
        {
            titulo: 'Saidas Totais',
            valor: moeda.format(dados.resumo.totalSaidas),
        },
        {
            titulo: 'Saldo Geral',
            valor: moeda.format(dados.resumo.saldoGeral),
        },
        { titulo: 'Atualizado em', valor: formatarDataISO(dados.atualizadoEm) },
    ];

    const resumoCards = document.getElementById('resumoCards');
    resumoCards.innerHTML = cards
        .map(
            (card) => `
      <article class="card">
        <small>${card.titulo}</small>
        <strong>${card.valor}</strong>
      </article>
    `,
        )
        .join('');

    const tabelasMeses = document.getElementById('tabelasMeses');
    tabelasMeses.innerHTML = dados.porMes
        .map((mes) => {
            const saldoClass = mes.saldo >= 0 ? 'positive' : 'negative';

            const linhas = mes.lancamentos
                .map((item) => {
                    const tipoClass =
                        item.tipo === 'entrada' ? 'positive' : 'negative';
                    const tipoTexto =
                        item.tipo === 'entrada' ? 'Entrada' : 'Saida';
                    const origemTexto =
                        item.origem === 'bloco_entrada_extra'
                            ? 'Entrada extra'
                            : 'Bloco 01';

                    return `
                        <tr>
                            <td>${escapeHtml(item.data)}</td>
                            <td>${escapeHtml(item.descricao)}</td>
                            <td class="${tipoClass}">${tipoTexto}</td>
                            <td>${escapeHtml(origemTexto)}</td>
                            <td>${moeda.format(item.valor)}</td>
                        </tr>
                    `;
                })
                .join('');

            return `
                <article class="month-section">
                    <header class="month-header">
                        <h3>${escapeHtml(mes.mes)}</h3>
                        <div class="month-summary">
                            <span>Entradas: <strong>${moeda.format(mes.entradas)}</strong></span>
                            <span>Saidas: <strong>${moeda.format(mes.saidas)}</strong></span>
                            <span class="${saldoClass}">Saldo: <strong>${moeda.format(mes.saldo)}</strong></span>
                            <span>Itens: <strong>${mes.itens}</strong></span>
                        </div>
                    </header>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Descricao</th>
                                    <th>Tipo</th>
                                    <th>Origem</th>
                                    <th>Valor</th>
                                </tr>
                            </thead>
                            <tbody>${linhas}</tbody>
                        </table>
                    </div>
                </article>
            `;
        })
        .join('');
})();

</script>
